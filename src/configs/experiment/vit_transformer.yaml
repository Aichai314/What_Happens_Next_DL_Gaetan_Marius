# @package _global_
# ViT-B/16 (ImageNet) + Temporal Transformer  —  Track B
# python src/train.py experiment=vit_transformer
defaults:
  - override /model: vit_transformer

model:
  unfreeze_blocks: 4    # fine-tune derniers 4 blocs ViT (sur 12)
  temporal_layers: 6
  dropout: 0.1

training:
  epochs: 20
  batch_size: 8         # réduire à 4 si OOM
  lr: 0.0001            # LR du temporal transformer + head
  backbone_lr_factor: 0.1  # blocs ViT entraînés à lr=0.00001
  augmentation: false
  num_workers: 4

dataset:
  num_frames: 4
