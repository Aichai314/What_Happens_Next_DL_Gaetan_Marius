# @package _global_
# python src/train.py experiment=cnn3d_transformer
defaults:
  - override /model: cnn3d_transformer

model:
  num_layers: 6
  dropout: 0.1

training:
  epochs: 60
  batch_size: 8
  lr: 0.001
  scheduler: cosine        # lr décroît de 0.001 → 1e-6 en cosine sur 60 epochs
  label_smoothing: 0.1     # évite l'overconfidence, régularise
  augmentation: true
  num_workers: 4

dataset:
  num_frames: 8
